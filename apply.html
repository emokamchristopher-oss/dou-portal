<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Application | DOU Portal</title>


<link rel="stylesheet" href="apply.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="left">

        <h1>Dennis Osadebay University</h1>

        <p>Admission Application Portal</p>

        <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=900" alt="Students">

    </div>

    <div class="right">

        <h2><i class="fa-solid fa-user-plus"></i> Apply for Admission</h2>

        <form>

            <div class="row">

                <div class="input-box">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter Full Name" required>
                </div>

                <div class="input-box">
                    <label>Email</label>
                    <input type="email" placeholder="Enter Email" required>
                </div>

            </div>

            <div class="row">

                <div class="input-box">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="08012345678" required>
                </div>

                <div class="input-box">
                    <label>Date of Birth</label>
                    <input type="date" required>
                </div>

            </div>

            <div class="row">

                <div class="input-box">
                    <label>Gender</label>

                    <select required>
                        <option>Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>

                </div>

                <div class="input-box">
                    <label>State of Origin</label>

                    <select required>
                        <option>Select State</option>
                        <option>Abia</option>
                        <option>Delta</option>
                        <option>Lagos</option>
                        <option>Rivers</option>
                        <option>Edo</option>
                        
                    </select>

                </div>

            </div>

            <div class="row">

                <div class="input-box">
                    <label>Faculty</label>

                    <select required>
                        <option>Select Faculty</option>
                        <option>Computing</option>
                        <option>Science</option>
                        <option>Management</option>
                        <option>Arts</option>
                        <option>Science</option>
                        <option>Allied sciences</option>
                    </select>

                </div>

                <div class="input-box">
                    <label>Programme</label>

                    <select required>
                        <option>Select Programme</option>
                        <option>Computer Science</option>
                        <option>Cyber Security</option>
                         <option>Data Science</option>
                          <option>Software Engineering</option>
                        <option>Accounting</option>
                        <option>Business Administration</option>
                         <option>Public Health</option>
                          <option>Nursing</option>
                    </select>

                </div>

            </div>

            <div class="input-box">

                <label>Upload Passport Photograph</label>

                <input type="file">

            </div>

            <button type="submit">
                Submit Application
            </button>

       <form action="success.html">

    </div>

</div>

</body>
</html>
