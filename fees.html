<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Fees</title>

<link rel="stylesheet" href="fees.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="header">
        <h2>💳 School Fees Portal</h2>
        <p>Check your payment status and fee breakdown</p>
    </div>

    <div class="student-info">
        <div>
            <h4>Name</h4>
            <p>John Doe</p>
        </div>

        <div>
            <h4>Matric No</h4>
            <p>DOU/CSC/24/001</p>
        </div>

        <div>
            <h4>Session</h4>
            <p>2025/2026</p>
        </div>
    </div>

    <div class="fee-card">

        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Amount (₦)</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Tuition Fee</td>
                    <td>120,000</td>
                    <td><span class="paid">Paid</span></td>
                </tr>

                <tr>
                    <td>Registration Fee</td>
                    <td>10,000</td>
                    <td><span class="pending">Pending</span></td>
                </tr>

                <tr>
                    <td>Library Fee</td>
                    <td>5,000</td>
                    <td><span class="paid">Paid</span></td>
                </tr>

                <tr>
                    <td>Hostel Fee</td>
                    <td>30,000</td>
                    <td><span class="not-paid">Not Paid</span></td>
                </tr>
            </tbody>
        </table>

        <div class="total">
            <h3>Total: ₦165,000</h3>
            <button>Pay Now</button>
        </div>

    </div>

</div>

</body>
</html>
