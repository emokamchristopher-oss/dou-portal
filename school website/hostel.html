<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hostel Application</title>

<link rel="stylesheet" href="hostel.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <h1>Hostel Application</h1>
    <p>Select a room type and apply</p>

    <div class="cards">

        <div class="card">
            <h2>Single Room</h2>
            <p>₦80,000 per session</p>
            <button>Apply</button>
        </div>

        <div class="card">
            <h2>Double Room</h2>
            <p>₦50,000 per session</p>
            <button>Apply</button>
        </div>

        <div class="card">
            <h2>Shared Room</h2>
            <p>₦30,000 per session</p>
            <button>Apply</button>
        </div>

    </div>

</div>

</body>
</html>
